<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>社团管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f7fa; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; text-align: center; }
        .nav { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .nav a { color: white; text-decoration: none; padding: 8px 16px; border-radius: 20px; transition: background 0.3s; }
        .nav a:hover { background: rgba(255,255,255,0.2); }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; }
        .stat-card h3 { color: #666; font-size: 14px; margin-bottom: 10px; }
        .stat-card .number { font-size: 36px; font-weight: bold; color: #667eea; }
        .section { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .section h2 { color: #333; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #f0f0f0; }
        .table { width: 100%; border-collapse: collapse; }
        .table th, .table td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        .table th { background: #f8f9fa; color: #666; font-weight: normal; }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; font-size: 14px; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a6fd6; }
        .no-data { text-align: center; color: #999; padding: 30px; }
    </style>
</head>
<body>
    <div class="header">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto;">
            <h1>社团管理系统</h1>
            <div style="text-align: right;">
                <span th:if="${currentUser != null}">
                    当前用户: <span th:text="${currentUser}"></span>
                    <form action="/logout" method="post" style="display: inline; margin-left: 15px;">
                        <button type="submit" style="background: none; border: none; color: white; cursor: pointer; text-decoration: underline;">退出</button>
                    </form>
                </span>
            </div>
        </div>
        <div class="nav">
            <a href="/">首页</a>
            <a href="/members">成员管理</a>
            <a href="/clubs">社团管理</a>
            <a href="/activities">活动管理</a>
        </div>
    </div>
    
    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <h3>成员总数</h3>
                <div class="number" th:text="${memberCount}">0</div>
            </div>
            <div class="stat-card">
                <h3>社团数量</h3>
                <div class="number" th:text="${clubCount}">0</div>
            </div>
            <div class="stat-card">
                <h3>活动数量</h3>
                <div class="number" th:text="${activityCount}">0</div>
            </div>
        </div>
        
        <div class="section">
            <h2>最近活动</h2>
            <table class="table">
                <thead>
                    <tr>
                        <th>活动名称</th>
                        <th>所属社团</th>
                        <th>时间</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${recentActivities.size() == 0}">
                        <td colspan="5" class="no-data">暂无活动</td>
                    </tr>
                    <tr th:each="activity : ${recentActivities}">
                        <td th:text="${activity.name}"></td>
                        <td th:text="${activity.club?.name}"></td>
                        <td th:text="${activity.startTime}"></td>
                        <td>
                            <span th:switch="${activity.status}">
                                <span th:case="'planned'" style="color: #f39c12;">待开始</span>
                                <span th:case="'ongoing'" style="color: #27ae60;">进行中</span>
                                <span th:case="'ended'" style="color: #95a5a6;">已结束</span>
                            </span>
                        </td>
                        <td>
                            <a th:href="'/activities/' + ${activity.id}" class="btn btn-primary">查看</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
