<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>活动详情</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f7fa; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; text-align: center; }
        .nav { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .nav a { color: white; text-decoration: none; padding: 8px 16px; border-radius: 20px; transition: background 0.3s; }
        .nav a:hover { background: rgba(255,255,255,0.2); }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .section { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .section h2 { color: #333; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #f0f0f0; }
        .info-row { display: flex; margin-bottom: 15px; }
        .info-label { width: 120px; color: #666; }
        .info-value { flex: 1; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; font-size: 14px; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a6fd6; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn-success { background: #27ae60; color: white; }
        .btn-success:hover { background: #1e8449; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-warning:hover { background: #e67e22; }
        .table { width: 100%; border-collapse: collapse; }
        .table th, .table td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        .table th { background: #f8f9fa; color: #666; font-weight: normal; }
        .form-inline { display: flex; gap: 10px; align-items: center; }
        .form-inline select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .no-data { text-align: center; color: #999; padding: 30px; }
        .status-planned { color: #f39c12; font-weight: bold; }
        .status-ongoing { color: #27ae60; font-weight: bold; }
        .status-ended { color: #95a5a6; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto;">
            <h1>社团管理系统</h1>
            <div style="text-align: right;">
                <span th:if="${currentUser != null}">
                    当前用户: <span th:text="${currentUser}"></span>
                    <form action="/logout" method="post" style="display: inline; margin-left: 15px;">
                        <button type="submit" style="background: none; border: none; color: white; cursor: pointer; text-decoration: underline;">退出</button>
                    </form>
                </span>
            </div>
        </div>
        <div class="nav">
            <a href="/">首页</a>
            <a href="/members">成员管理</a>
            <a href="/clubs">社团管理</a>
            <a href="/activities">活动管理</a>
        </div>
    </div>
    
    <div class="container">
        <div class="section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>活动详情：<span th:text="${activity.name}"></span></h2>
                <a href="/activities" class="btn btn-primary">返回列表</a>
            </div>
            <div class="info-row">
                <span class="info-label">ID:</span>
                <span class="info-value" th:text="${activity.id}"></span>
            </div>
            <div class="info-row">
                <span class="info-label">所属社团:</span>
                <span class="info-value" th:text="${activity.club?.name}"></span>
            </div>
            <div class="info-row">
                <span class="info-label">描述:</span>
                <span class="info-value" th:text="${activity.description} ?: '无'"></span>
            </div>
            <div class="info-row">
                <span class="info-label">开始时间:</span>
                <span class="info-value" th:text="${activity.startTime}"></span>
            </div>
            <div class="info-row">
                <span class="info-label">结束时间:</span>
                <span class="info-value" th:text="${activity.endTime}"></span>
            </div>
            <div class="info-row">
                <span class="info-label">地点:</span>
                <span class="info-value" th:text="${activity.location}"></span>
            </div>
            <div class="info-row">
                <span class="info-label">状态:</span>
                <span class="info-value">
                    <span th:if="${activity.status == 'planned'}" class="status-planned">待开始</span>
                    <span th:if="${activity.status == 'ongoing'}" class="status-ongoing">进行中</span>
                    <span th:if="${activity.status == 'ended'}" class="status-ended">已结束</span>
                </span>
            </div>
            <div class="info-row">
                <span class="info-label">参与人数:</span>
                <span class="info-value" th:text="${activity.participants?.size()}"></span>
            </div>
            
            <div style="margin-top: 20px;">
                <a th:if="${activity.status == 'planned'}" th:href="'/activities/' + ${activity.id} + '/start'" class="btn btn-warning">开始活动</a>
                <a th:if="${activity.status == 'ongoing'}" th:href="'/activities/' + ${activity.id} + '/end'" class="btn btn-danger">结束活动</a>
            </div>
        </div>
        
        <div class="section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3>参与者列表</h3>
                <form th:action="'/activities/' + ${activity.id} + '/add-participant'" method="post" class="form-inline">
                    <select name="memberId" required>
                        <option value="">选择成员</option>
                        <option th:each="member : ${allMembers}" th:if="${!activity.participants.contains(member)}" 
                                th:value="${member.id}" th:text="${member.name} + ' (' + member.studentId + ')'"></option>
                    </select>
                    <button type="submit" class="btn btn-success">报名</button>
                </form>
            </div>
            <table class="table">
                <thead>
                    <tr>
                        <th>姓名</th>
                        <th>学号</th>
                        <th>院系</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${activity.participants?.size() == 0}">
                        <td colspan="4" class="no-data">暂无参与者</td>
                    </tr>
                    <tr th:each="member : ${activity.participants}">
                        <td th:text="${member.name}"></td>
                        <td th:text="${member.studentId}"></td>
                        <td th:text="${member.department}"></td>
                        <td>
                            <a th:href="'/activities/' + ${activity.id} + '/remove-participant/' + ${member.id}" 
                               class="btn btn-danger" 
                               onclick="return confirm('确定要取消报名吗？')">取消报名</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
