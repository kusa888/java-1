<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>待审批活动 - 社团管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f7fa; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; text-align: center; }
        .nav { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .nav a { color: white; text-decoration: none; padding: 8px 16px; border-radius: 20px; transition: background 0.3s; }
        .nav a:hover { background: rgba(255,255,255,0.2); }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .section { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-header h2 { color: #333; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; font-size: 14px; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a6fd6; }
        .btn-success { background: #27ae60; color: white; }
        .btn-success:hover { background: #1e8449; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .table { width: 100%; border-collapse: collapse; }
        .table th, .table td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        .table th { background: #f8f9fa; color: #666; font-weight: normal; }
        .actions { display: flex; gap: 8px; }
        .no-data { text-align: center; color: #999; padding: 30px; }
        .approval-pending { color: #f39c12; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto;">
            <h1>社团管理系统</h1>
            <div style="text-align: right;">
                <span th:if="${currentUser != null}">
                    当前用户: <span th:text="${currentUser}"></span>
                    <form action="/logout" method="post" style="display: inline; margin-left: 15px;">
                        <button type="submit" style="background: none; border: none; color: white; cursor: pointer; text-decoration: underline;">退出</button>
                    </form>
                </span>
            </div>
        </div>
        <div class="nav">
            <a href="/">首页</a>
            <a href="/members">成员管理</a>
            <a href="/clubs">社团管理</a>
            <a href="/activities">活动管理</a>
            <a href="/activities/pending">待审批</a>
        </div>
    </div>
    
    <div class="container">
        <div class="section">
            <div class="section-header">
                <h2>待审批活动</h2>
                <a href="/activities" class="btn btn-primary">返回活动列表</a>
            </div>
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>活动名称</th>
                        <th>所属社团</th>
                        <th>开始时间</th>
                        <th>结束时间</th>
                        <th>地点</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${pendingActivities.size() == 0}">
                        <td colspan="8" class="no-data">暂无待审批活动</td>
                    </tr>
                    <tr th:each="activity : ${pendingActivities}">
                        <td th:text="${activity.id}"></td>
                        <td><a th:href="'/activities/' + ${activity.id}" th:text="${activity.name}" style="color: #667eea;"></a></td>
                        <td th:text="${activity.club?.name}"></td>
                        <td th:text="${activity.startTime}"></td>
                        <td th:text="${activity.endTime}"></td>
                        <td th:text="${activity.location}"></td>
                        <td><span class="approval-pending">待审批</span></td>
                        <td class="actions">
                            <a th:href="'/activities/' + ${activity.id} + '/approve'" class="btn btn-success">批准</a>
                            <a th:href="'/activities/' + ${activity.id} + '/reject'" class="btn btn-danger">拒绝</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
