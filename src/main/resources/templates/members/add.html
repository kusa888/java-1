<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>添加成员</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f7fa; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; text-align: center; }
        .nav { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .nav a { color: white; text-decoration: none; padding: 8px 16px; border-radius: 20px; transition: background 0.3s; }
        .nav a:hover { background: rgba(255,255,255,0.2); }
        .container { max-width: 600px; margin: 30px auto; padding: 0 20px; }
        .section { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .section h2 { color: #333; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #f0f0f0; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #666; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; font-size: 14px; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a6fd6; }
        .btn-secondary { background: #95a5a6; color: white; margin-left: 10px; }
        .btn-secondary:hover { background: #7f8c8d; }
        .error { color: #e74c3c; margin-bottom: 15px; padding: 10px; background: #fee; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>社团管理系统</h1>
        <div class="nav">
            <a href="/">首页</a>
            <a href="/members">成员管理</a>
            <a href="/clubs">社团管理</a>
            <a href="/activities">活动管理</a>
        </div>
    </div>
    
    <div class="container">
        <div class="section">
            <h2>添加成员</h2>
            <div th:if="${error}" class="error" th:text="${error}"></div>
            <form method="post" action="/members/add">
                <div class="form-group">
                    <label>姓名 *</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>学号 *</label>
                    <input type="text" name="studentId" required>
                </div>
                <div class="form-group">
                    <label>手机号</label>
                    <input type="text" name="phone">
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" name="email">
                </div>
                <div class="form-group">
                    <label>院系 *</label>
                    <input type="text" name="department" required>
                </div>
                <button type="submit" class="btn btn-primary">添加</button>
                <a href="/members" class="btn btn-secondary">取消</a>
            </form>
        </div>
    </div>
</body>
</html>
