<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>社团详情</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f7fa; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; text-align: center; }
        .nav { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .nav a { color: white; text-decoration: none; padding: 8px 16px; border-radius: 20px; transition: background 0.3s; }
        .nav a:hover { background: rgba(255,255,255,0.2); }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .section { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .section h2 { color: #333; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #f0f0f0; }
        .info-row { display: flex; margin-bottom: 15px; }
        .info-label { width: 100px; color: #666; }
        .info-value { flex: 1; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; font-size: 14px; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a6fd6; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn-success { background: #27ae60; color: white; }
        .btn-success:hover { background: #1e8449; }
        .table { width: 100%; border-collapse: collapse; }
        .table th, .table td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        .table th { background: #f8f9fa; color: #666; font-weight: normal; }
        .form-inline { display: flex; gap: 10px; align-items: center; }
        .form-inline select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .no-data { text-align: center; color: #999; padding: 30px; }
        .president-badge { background: #f39c12; color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>社团管理系统</h1>
        <div class="nav">
            <a href="/">首页</a>
            <a href="/members">成员管理</a>
            <a href="/clubs">社团管理</a>
            <a href="/activities">活动管理</a>
        </div>
    </div>
    
    <div class="container">
        <div class="section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>社团详情：<span th:text="${club.name}"></span></h2>
                <a href="/clubs" class="btn btn-primary">返回列表</a>
            </div>
            <div class="info-row">
                <span class="info-label">ID:</span>
                <span class="info-value" th:text="${club.id}"></span>
            </div>
            <div class="info-row">
                <span class="info-label">描述:</span>
                <span class="info-value" th:text="${club.description} ?: '无'"></span>
            </div>
            <div class="info-row">
                <span class="info-label">社长:</span>
                <span class="info-value" th:text="${club.president?.name} ?: '未设置'"></span>
            </div>
            <div class="info-row">
                <span class="info-label">成立日期:</span>
                <span class="info-value" th:text="${club.foundedDate}"></span>
            </div>
            <div class="info-row">
                <span class="info-label">成员数:</span>
                <span class="info-value" th:text="${club.members?.size()}"></span>
            </div>
        </div>
        
        <div class="section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3>成员列表</h3>
                <form th:action="'/clubs/' + ${club.id} + '/add-member'" method="post" class="form-inline">
                    <select name="memberId" required>
                        <option value="">选择成员</option>
                        <option th:each="member : ${allMembers}" th:if="${!club.members.contains(member)}" 
                                th:value="${member.id}" th:text="${member.name} + ' (' + member.studentId + ')'"></option>
                    </select>
                    <button type="submit" class="btn btn-success">添加成员</button>
                </form>
            </div>
            <table class="table">
                <thead>
                    <tr>
                        <th>姓名</th>
                        <th>学号</th>
                        <th>角色</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${club.members?.size() == 0}">
                        <td colspan="4" class="no-data">暂无成员</td>
                    </tr>
                    <tr th:each="member : ${club.members}">
                        <td th:text="${member.name}"></td>
                        <td th:text="${member.studentId}"></td>
                        <td>
                            <span th:if="${member.id == club.president?.id}" class="president-badge">社长</span>
                            <span th:else>成员</span>
                        </td>
                        <td>
                            <a th:if="${member.id != club.president?.id}" 
                               th:href="'/clubs/' + ${club.id} + '/remove-member/' + ${member.id}" 
                               class="btn btn-danger" 
                               onclick="return confirm('确定要移除该成员吗？')">移除</a>
                            <span th:else style="color: #999;">不可移除</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="section">
            <h3>更换社长</h3>
            <form th:action="'/clubs/' + ${club.id} + '/change-president'" method="post" class="form-inline">
                <select name="presidentId" required>
                    <option value="">选择新社长</option>
                    <option th:each="member : ${club.members}" th:value="${member.id}" th:text="${member.name}"></option>
                </select>
                <button type="submit" class="btn btn-primary">更换社长</button>
            </form>
        </div>
    </div>
</body>
</html>
